# =============================================================
#  locust.conf  –  Default CLI options (can be overridden)
#  Docs: https://docs.locust.io/en/stable/configuration.html
# =============================================================

locustfile = tests/locustfile.py
host       = https://www.saucedemo.com

# Default load shape (override with CLI flags as needed)
users      = 5      # total concurrent virtual users
spawn-rate = 1      # users spawned per second
run-time   = 1m     # total test duration

# HTML report saved after each headless run
html       = reports/load_test_report.html